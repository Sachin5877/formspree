<!DOCTYPE html>
<html>
<head>
    <title>Search Box</title>

    <style>
        body{
            font-family:Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f5f5f5;
        }

        form{
            display:flex;
        }

        input{
            width:350px;
            padding:12px;
            font-size:18px;
        }

        button{
            padding:12px 20px;
            font-size:18px;
            cursor:pointer;
        }
    </style>
</head>

<body>

<form action="https://formspree.io/f/xlgqegve" method="POST">

    <input
        type="text"
        name="search"
        placeholder="Search anything..."
        required>

    <button type="submit">
        Search
    </button>

</form>

</body>
</html>
